<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌟 Welcome - Ultimate Media Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0e1621, #1a2332); color: white; font-family: system-ui, sans-serif; }
    .card { background: linear-gradient(145deg, #17212b, #1f2a37); border-radius: 20px; padding: 25px; max-width: 400px; margin: 20px auto; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
    .badge { background: linear-gradient(135deg, #6366f1, #8b5cf6); padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .btn { background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7); color: white; padding: 14px 20px; border-radius: 14px; font-weight: 600; text-decoration: none; display: block; text-align: center; margin-top: 20px; }
    .btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
<div class="card">
  <div style="position: relative; border-radius: 16px; overflow: hidden; margin-bottom: 20px;">
    <span class="badge" style="position: absolute; top: 12px; right: 12px;">✨ Premium</span>
    <img src="{{ banner }}" alt="Welcome" style="width: 100%; border-radius: 16px;" onerror="this.src='https://via.placeholder.com/400x220/1f2a37/8ab4f8?text=🎬+Ultimate+Media'">
  </div>
  <h2 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 12px; background: linear-gradient(135deg, #8ab4f8, #a7c7f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
    🌟 Welcome to Ultimate Media Search!
  </h2>
  <p style="color: #9aa7b5; line-height: 1.6; margin-bottom: 20px;">
    "Your smartphone is now your ATM. Stop scrolling for free—start earning for your time! 💰✨"
  </p>
  <div style="display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(138,180,248,0.15); border-bottom: 1px solid rgba(138,180,248,0.15); margin-bottom: 20px;">
    <div style="text-align: center;"><div style="font-size: 1.3rem; font-weight: 700; color: #8ab4f8;">+25</div><div style="font-size: 0.75rem; color: #6b7a8f;">Per Ad</div></div>
    <div style="text-align: center;"><div style="font-size: 1.3rem; font-weight: 700; color: #8ab4f8;">+100</div><div style="font-size: 0.75rem; color: #6b7a8f;">Social</div></div>
    <div style="text-align: center;"><div style="font-size: 1.3rem; font-weight: 700; color: #8ab4f8;">$1</div><div style="font-size: 0.75rem; color: #6b7a8f;">= 100 Pts</div></div>
  </div>
  <a href="{{ app_url }}/dashboard?id={user_id}&name={user_name}" class="btn" id="dashBtn">🚀 Open Dashboard & Start Earning</a>
  <p style="margin-top: 18px; font-size: 0.8rem; color: #5a6a7e; text-align: center;">🔐 Secure • ⚡ Instant • 🎁 Daily</p>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const uid = params.get('id') || '0';
  const name = params.get('name') || 'User';
  const btn = document.getElementById('dashBtn');
  if (btn) btn.href = btn.href.replace('{user_id}', uid).replace('{user_name}', encodeURIComponent(name));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Admin Login - Ultimate Media Search</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .login-card{background:#1e293b;border-radius:20px;padding:30px;max-width:400px;width:100%;border:1px solid #334155;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
        .logo{text-align:center;margin-bottom:24px;font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .input-group{margin-bottom:16px}
        .input-group label{display:block;margin-bottom:6px;font-size:0.9rem;color:#94a3b8}
        .input-group input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#f1f5f9;font-size:1rem;outline:none;transition:border-color 0.2s}
        .input-group input:focus{border-color:#6366f1}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:12px;font-weight:600;font-size:1rem;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s}
        .btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(99,102,241,0.4)}
        .error{background:#ef4444;color:#fff;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:0.9rem;display:none}
        .footer{text-align:center;margin-top:20px;font-size:0.8rem;color:#64748b}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">👑 Admin Panel</div>
        <div id="errorMsg" class="error">❌ Invalid credentials!</div>
        <form id="loginForm">
            <div class="input-group">
                <label>Admin Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn">🔓 Login to Dashboard</button>
        </form>
        <div class="footer">🔐 Secure Admin Access • Ultimate Media Search Bot</div>
    </div>

    <script>
        // ⚠️ Change these credentials in production!
        const ADMIN_CREDENTIALS = {
            username: 'admin',
            password: 'admin123'  // 🔐 Change this!
        };

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                // Set admin session
                sessionStorage.setItem('adminAuth', 'true');
                sessionStorage.setItem('adminUser', username);
                window.location.href = '/admin/dashboard';
            } else {
                errorMsg.style.display = 'block';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
            }
        });

        // Check if already logged in
        if (sessionStorage.getItem('adminAuth') === 'true') {
            window.location.href = '/admin/dashboard';
        }
    </script>
</body>
</html>

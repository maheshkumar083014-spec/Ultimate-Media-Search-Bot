<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Premium Earn Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #050a18;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body {
            background: radial-gradient(circle at top, #1e293b, #050a18);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Glass Cards */
        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        /* Header Section */
        .profile-header { display: flex; align-items: center; gap: 15px; }
        .avatar {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; border: 2px solid var(--primary);
        }
        .welcome-text h2 { font-size: 1.2rem; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-id { font-size: 0.75rem; color: var(--primary); font-family: monospace; }

        /* Stats Grid */
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;
        }
        .stat-box {
            background: rgba(0,0,0,0.2);
            padding: 15px; border-radius: 18px; text-align: center;
            border: 1px solid rgba(0, 210, 255, 0.1);
        }
        .stat-val { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; }

        /* Progress Bar */
        .progress-container { margin: 15px 0; }
        .bar-bg { background: rgba(255,255,255,0.05); height: 8px; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.5s; box-shadow: 0 0 10px var(--primary); }

        /* Buttons */
        .btn-main {
            width: 100%; padding: 16px; border-radius: 16px; border: none;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white; font-weight: 600; font-size: 1rem; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-main:disabled { filter: grayscale(1); cursor: not-allowed; opacity: 0.5; }

        /* Task Items */
        .task-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .task-item {
            background: rgba(255,255,255,0.02);
            padding: 12px 15px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--border);
        }
        .task-info { display: flex; align-items: center; gap: 12px; }
        .task-info i { font-size: 1.2rem; color: var(--primary); }
        .verify-badge {
            font-size: 0.75rem; padding: 6px 12px; border-radius: 50px;
            background: rgba(0, 210, 255, 0.1); color: var(--primary); cursor: pointer;
        }
        .done { background: rgba(34, 197, 94, 0.2); color: #22c55e; cursor: default; }

        #timerMsg { font-size: 0.8rem; text-align: center; margin-top: 10px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <div class="profile-header">
            <div class="avatar"><i class="fas fa-user-ninja"></i></div>
            <div class="welcome-text">
                <h2>Welcome Back!</h2>
                <div class="user-id">ID: <span id="displayUid">{{ uid }}</span></div>
            </div>
        </div>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-val" id="pointsVal">{{ pts }}</div>
                <div class="stat-label">Total Points</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="cashVal">$0.00</div>
                <div class="stat-label">Earnings</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
            <span style="font-size: 0.9rem; font-weight: 600;">Daily Ad Tasks</span>
            <span id="adRatio" style="font-size: 0.8rem; color: var(--primary);">0/10</span>
        </div>
        <div class="progress-container">
            <div class="bar-bg"><div class="bar-fill" id="adBar"></div></div>
        </div>
        <button class="btn-main" id="adBtn" onclick="startAdTimer()">
            <i class="fas fa-play"></i> Watch Ad & Earn +25 Pts
        </button>
        <div id="timerMsg"></div>
    </div>

    <div class="card">
        <h3 style="font-size: 1rem; margin-bottom: 12px;"><i class="fas fa-tasks"></i> Social Missions</h3>
        <div class="task-list">
            <div class="task-item">
                <div class="task-info"><i class="fab fa-youtube"></i><span>YouTube Task</span></div>
                <div class="verify-badge" onclick="handleSocial('youtube', 'https://www.youtube.com/@Instagrampost1')">Verify +100</div>
            </div>
            <div class="task-item">
                <div class="task-info"><i class="fab fa-instagram"></i><span>Instagram Task</span></div>
                <div class="verify-badge" onclick="handleSocial('instagram', 'https://www.instagram.com/digital_rockstar_m')">Verify +100</div>
            </div>
            <div class="task-item">
                <div class="task-info"><i class="fab fa-facebook"></i><span>Facebook Task</span></div>
                <div class="verify-badge" onclick="handleSocial('facebook', 'https://www.facebook.com/profile.php?id=61574378159053')">Verify +100</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Firebase Config (Replace with yours)
    const firebaseConfig = {
        apiKey: "AIzaSyD50eWvysruXgtgpDhhCVE2zdbSbLkFBwk",
        authDomain: "ultimatemediasearch.firebaseapp.com",
        databaseURL: "https://ultimatemediasearch-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "ultimatemediasearch",
        storageBucket: "ultimatemediasearch.appspot.com",
        messagingSenderId: "123003124713",
        appId: "1:123003124713:web:c738c97b2772b112822978"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const userId = "{{ uid }}";
    const smartLink = "{{ ad_link }}";

    // Update UI on Data Change
    db.ref('users/' + userId).on('value', (snap) => {
        const data = snap.val() || { pts: 0, ads: 0 };
        document.getElementById('pointsVal').innerText = data.pts || 0;
        document.getElementById('cashVal').innerText = "$" + ((data.pts || 0) / 100).toFixed(2);
        
        const adCount = data.ads || 0;
        document.getElementById('adRatio').innerText = adCount + "/10";
        document.getElementById('adBar').style.width = (adCount * 10) + "%";
        
        if(adCount >= 10) {
            document.getElementById('adBtn').disabled = true;
            document.getElementById('adBtn').innerText = "Daily Limit Reached";
        }
    });

    // Ad Timer Logic
    function startAdTimer() {
        window.open(smartLink, '_blank');
        let timeLeft = 30;
        const btn = document.getElementById('adBtn');
        const msg = document.getElementById('timerMsg');
        btn.disabled = true;

        const timer = setInterval(() => {
            timeLeft--;
            msg.innerText = `⏱ Stay on page for ${timeLeft}s to get rewards...`;
            if(timeLeft <= 0) {
                clearInterval(timer);
                msg.innerText = "✅ Reward Credited!";
                updatePoints(25, true);
                btn.disabled = false;
                setTimeout(() => msg.innerText = "", 3000);
            }
        }, 1000);
    }

    // Social Tasks Logic
    function handleSocial(platform, link) {
        window.open(link, '_blank');
        const badge = event.target;
        badge.innerText = "⌛ Verifying...";
        
        setTimeout(() => {
            badge.innerText = "✅ Done";
            badge.classList.add('done');
            badge.onclick = null;
            updatePoints(100, false);
        }, 5000);
    }

    function updatePoints(amount, isAd) {
        const ref = db.ref('users/' + userId);
        ref.transaction((current) => {
            if (current) {
                current.pts = (current.pts || 0) + amount;
                if(isAd) current.ads = (current.ads || 0) + 1;
            }
            return current;
        });
    }
</script>

</body>
</html>

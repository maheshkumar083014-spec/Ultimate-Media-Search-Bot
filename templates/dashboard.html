<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Earn Bot Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --bg: #050a18; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: radial-gradient(circle at top, #1e293b, #050a18); color: white; min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        
        .welcome-header { text-align: left; margin-bottom: 5px; }
        #greeting { color: var(--primary); font-size: 0.9rem; margin: 0; font-weight: 300; }
        .user-title { font-size: 1.6rem; font-weight: 700; margin-top: 2px; }
        .user-id { font-size: 0.7rem; color: #64748b; font-family: monospace; margin-top: 5px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 18px; text-align: center; border: 1px solid rgba(0, 210, 255, 0.1); }
        .stat-val { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }

        .bar-bg { background: rgba(255,255,255,0.05); height: 8px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.5s; box-shadow: 0 0 10px var(--primary); }

        .btn-main { width: 100%; padding: 16px; border-radius: 16px; border: none; background: linear-gradient(90deg, var(--primary), var(--secondary)); color: white; font-weight: 600; font-size: 1rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-main:active { transform: scale(0.98); }

        .task-item { background: rgba(255,255,255,0.02); padding: 12px 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); margin-top: 10px; }
        .task-info { display: flex; align-items: center; gap: 12px; }
        .task-info i { font-size: 1.2rem; color: var(--primary); }
        .verify-badge { font-size: 0.75rem; padding: 6px 12px; border-radius: 50px; background: rgba(0, 210, 255, 0.1); color: var(--primary); cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <div class="welcome-header">
            <p id="greeting">Good Morning,</p>
            <h2 class="user-title">{{ user_name }}! 👋</h2>
            <div class="user-id">UID: {{ uid }}</div>
        </div>
        <div class="stats-grid">
            <div class="stat-box"><div class="stat-val" id="pointsVal">{{ pts }}</div><div class="stat-label">Points</div></div>
            <div class="stat-box"><div class="stat-val" id="cashVal">$0.00</div><div class="stat-label">Earnings</div></div>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
            <span>Daily Ad Progress</span>
            <span id="adRatio" style="color: var(--primary);">0/10</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" id="adBar"></div></div>
        <button class="btn-main" id="adBtn" onclick="startAdTimer()">
            <i class="fas fa-play-circle"></i> Watch Ad & Earn +25 Pts
        </button>
        <p id="timerMsg" style="text-align: center; font-size: 0.75rem; margin-top: 10px; color: #64748b;"></p>
    </div>

    <div class="card">
        <h3 style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 5px;">SOCIAL MISSIONS</h3>
        <div class="task-item">
            <div class="task-info"><i class="fab fa-youtube"></i><span>YouTube Sub</span></div>
            <div class="verify-badge" onclick="handleSocial('youtube', 'https://www.youtube.com/@Instagrampost1')">Verify +100</div>
        </div>
        <div class="task-item">
            <div class="task-info"><i class="fab fa-instagram"></i><span>Instagram Follow</span></div>
            <div class="verify-badge" onclick="handleSocial('instagram', 'https://www.instagram.com/digital_rockstar_m')">Verify +100</div>
        </div>
        <div class="task-item">
            <div class="task-info"><i class="fab fa-facebook"></i><span>Facebook Like</span></div>
            <div class="verify-badge" onclick="handleSocial('facebook', 'https://www.facebook.com/profile.php?id=61574378159053')">Verify +100</div>
        </div>
    </div>
</div>

<script>
    // Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyD50eWvysruXgtgpDhhCVE2zdbSbLkFBwk",
        authDomain: "ultimatemediasearch.firebaseapp.com",
        databaseURL: "https://ultimatemediasearch-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "ultimatemediasearch",
        storageBucket: "ultimatemediasearch.appspot.com",
        messagingSenderId: "123003124713",
        appId: "1:123003124713:web:c738c97b2772b112822978"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userId = "{{ uid }}";
    const smartLink = "{{ ad_link }}";

    // Greeting Script
    const hour = new Date().getHours();
    const greeting = document.getElementById('greeting');
    if (hour < 12) greeting.innerText = "Good Morning,";
    else if (hour < 17) greeting.innerText = "Good Afternoon,";
    else greeting.innerText = "Good Evening,";

    // Points Update Logic
    db.ref('users/' + userId).on('value', (snap) => {
        const data = snap.val() || { pts: 0, ads: 0 };
        document.getElementById('pointsVal').innerText = data.pts;
        document.getElementById('cashVal').innerText = "$" + (data.pts / 100).toFixed(2);
        const ads = data.ads || 0;
        document.getElementById('adRatio').innerText = ads + "/10";
        document.getElementById('adBar').style.width = (ads * 10) + "%";
        if(ads >= 10) document.getElementById('adBtn').disabled = true;
    });

    // 30 Seconds Timer Requirement
    function startAdTimer() {
        window.open(smartLink, '_blank');
        let sec = 30;
        const btn = document.getElementById('adBtn');
        const msg = document.getElementById('timerMsg');
        btn.disabled = true;
        const t = setInterval(() => {
            sec--;
            msg.innerText = `⏱ Reward unlocking in ${sec}s...`;
            if(sec <= 0) {
                clearInterval(t);
                msg.innerText = "✅ 25 Points Added!";
                updateDB(25, true);
                btn.disabled = false;
                setTimeout(() => msg.innerText = "", 3000);
            }
        }, 1000);
    }

    function handleSocial(p, link) {
        window.open(link, '_blank');
        setTimeout(() => updateDB(100, false), 5000);
    }

    function updateDB(a, isAd) {
        db.ref('users/' + userId).transaction(c => {
            if(c) {
                c.pts = (c.pts || 0) + a;
                if(isAd) c.ads = (c.ads || 0) + 1;
            }
            return c;
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0088cc; --bg: #0f172a; --card: #1e293b; --text: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { width: 90%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .pts-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); }
        .pts-val { font-size: 3rem; font-weight: 600; color: #22c55e; }
        .btn { display: block; background: var(--primary); color: white; text-decoration: none; padding: 15px; border-radius: 12px; font-weight: 600; margin-top: 20px; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        .uid { font-size: 0.8rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="uid">ID: {{ uid }}</div>
        <div class="pts-box">
            <div style="color: var(--primary)">Current Balance</div>
            <div class="pts-val">{{ pts }}</div>
            <div style="font-size: 0.8rem; color: #94a3b8;">Points</div>
        </div>
        <a href="{{ ad_link }}" target="_blank" class="btn">🚀 Watch Ads & Earn</a>
        <p style="font-size: 0.7rem; color: #64748b; margin-top: 15px;">Stay for 30 seconds to get rewards.</p>
    </div>
</body>
</html>

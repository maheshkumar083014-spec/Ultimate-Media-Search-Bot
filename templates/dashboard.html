<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Outfit', sans-serif; text-align: center; padding: 20px; }
        .card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .btn { background: #00d2ff; color: white; padding: 15px; border-radius: 12px; display: block; text-decoration: none; margin-top: 20px; font-weight: bold; }
        .points { font-size: 3rem; color: #00d2ff; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="card">
        <p>Welcome, {{ user_name }}!</p>
        <div class="points" id="pts">{{ pts }}</div>
        <p>Points Earned</p>
        <a href="#" class="btn" onclick="watchAd()">🚀 Watch Ad & Earn</a>
    </div>
    <script>
        function watchAd() {
            window.open("https://horizontallyresearchpolar.com/r0wbx3kyf?key=8b0a2298684c7cea730312add326101b", "_blank");
            alert("Stay for 30s to claim rewards!");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnPro Dashboard</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; }
        .brand { background: #2563eb; padding: 6px 12px; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .balance-card { background: #161b22; border: 1px solid #30363d; border-radius: 28px; padding: 30px 20px; text-align: center; margin: 20px 0; border-bottom: 4px solid #fbbf24; }
        .balance-amount { font-size: 55px; font-weight: 800; color: #fbbf24; margin: 5px 0; }
        .section-title { font-size: 14px; color: #8b949e; margin: 15px 0 10px 5px; font-weight: bold; text-transform: uppercase; }
        .task-card { background: #161b22; border: 1px solid #30363d; border-radius: 18px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; text-decoration: none; color: white; transition: 0.3s; }
        .task-card:active { transform: scale(0.98); background: #1c2128; }
        .btn-claim { background: #fbbf24; color: black; padding: 8px 18px; border-radius: 12px; font-weight: bold; font-size: 13px; }
        .refer-section { background: rgba(37, 99, 235, 0.1); border: 1px dashed #2563eb; border-radius: 22px; padding: 20px; text-align: center; margin-top: 25px; }
        .promo-code { font-size: 24px; font-weight: bold; color: #2563eb; letter-spacing: 3px; margin: 10px 0; background: #0d1117; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="brand">EARNPRO</div>
        <div style="color: #8b949e; font-size: 12px;">ID: {{uid[:8]}}</div>
    </div>

    <div class="balance-card">
        <div style="color: #8b949e; font-size: 13px; letter-spacing: 1px;">TOTAL COINS</div>
        <div class="balance-amount">{{pts}}.00</div>
        <div style="color: #fbbf24; font-size: 11px; font-weight: bold;">MINIMUM WITHDRAW: 200</div>
    </div>

    <div class="section-title">Daily Earning</div>
    <a href="{{ad_link}}" target="_blank" class="task-card">
        <div>
            <span style="font-size: 16px; font-weight: bold;">📺 Watch Video Ad</span><br>
            <small style="color: #8b949e;">Earn +10.00 Coins Instantly</small>
        </div>
        <div class="btn-claim">WATCH</div>
    </a>

    <div class="section-title">Social Tasks</div>
    <a href="https://www.youtube.com/@USSoccerPulse" class="task-card">
        <div><span style="color: #ff0000;">●</span> YouTube Subscribe</div>
        <div style="color: #8b949e; font-size: 12px;">+5 Coins</div>
    </a>
    
    <a href="https://instagram.com/digital_rockstar_m" class="task-card">
        <div><span style="color: #e1306c;">●</span> Instagram Follow</div>
        <div style="color: #8b949e; font-size: 12px;">+5 Coins</div>
    </a>

    <div class="refer-section">
        <div style="font-size: 12px; color: #8b949e;">Your Referral Code</div>
        <div class="promo-code">EP-{{uid[:6]}}</div>
        <p style="font-size: 12px; color: #8b949e; margin-bottom: 15px;">Earn <b>+15 Coins</b> for every friend who joins!</p>
        <button onclick="window.location.href='https://t.me/share/url?url=https://t.me/bot?start={{uid}}'" style="background: #2563eb; color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 16px;">INVITE FRIENDS</button>
    </div>

    <div style="text-align: center; margin-top: 30px; padding-bottom: 20px;">
        <button style="background: none; border: 1px solid #30363d; color: #8b949e; padding: 10px 20px; border-radius: 10px; font-size: 12px;">Withdraw History</button>
    </div>
</body>
</html>

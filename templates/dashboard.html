<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#020617;color:white;font-family:sans-serif;text-align:center}
.card{background:#1e293b;margin:15px;padding:20px;border-radius:15px}
.btn{padding:12px;border:none;border-radius:20px;background:#0ea5e9;color:white;width:100%}
</style>
</head>

<body>

<h2 id="name"></h2>
<p>UID: <span id="uid"></span></p>

<div class="card">
<h3>Points: <span id="points">0</span></h3>
<h3>$ <span id="money">0</span></h3>
</div>

<div class="card">
<button class="btn" onclick="watchAd()">Watch Ad +25</button>
<p id="timer"></p>
</div>

<div class="card">
<button class="btn" onclick="refer()">Copy Referral</button>
</div>

<div class="card">
<input id="upi" placeholder="Enter UPI">
<button class="btn" onclick="withdraw()">Withdraw</button>
</div>

<script>
const p=new URLSearchParams(location.search)
const uid=p.get("id")
const name=p.get("name")

document.getElementById("uid").innerText=uid
document.getElementById("name").innerText="Welcome "+name

function load(){
 fetch("/get_user/"+uid).then(r=>r.json()).then(d=>{
  let pts=d.points||0
  document.getElementById("points").innerText=pts
  document.getElementById("money").innerText=(pts/100).toFixed(2)
 })
}
setInterval(load,2000)

function watchAd(){
 let t=30
 let x=setInterval(()=>{
  document.getElementById("timer").innerText="Wait "+t
  t--
  if(t<0){
   clearInterval(x)
   fetch("/add_points",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({uid:uid,points:25})})
  }
 },1000)
 window.open("https://horizontallyresearchpolar.com/")
}

function refer(){
 let link="https://t.me/YOUR_BOT?start="+uid
 navigator.clipboard.writeText(link)
 alert("Copied referral link")
}

function withdraw(){
 let upi=document.getElementById("upi").value
 fetch("/withdraw",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({uid:uid,upi:upi})})
 alert("Request Sent")
}
</script>

</body>
</html>

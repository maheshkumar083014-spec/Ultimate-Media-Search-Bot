<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | Earn Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0088cc;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #ffffff;
            --accent-green: #22c55e;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard-container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .user-id {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .points-section {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }

        .points-section h2 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        .pts-value {
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--accent-green);
            margin: 10px 0;
        }

        .btn-smart-link {
            display: block;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.2s, background 0.3s;
            margin-top: 15px;
        }

        .btn-smart-link:active {
            transform: scale(0.95);
            background: #0077b5;
        }

        .info-text {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 15px;
            line-height: 1.4;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(34, 197, 94, 0.2);
            color: var(--accent-green);
            border-radius: 50px;
            font-size: 0.7rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="status-badge">● System Online</div>
        <div class="user-id">User ID: {{ uid }}</div>
        
        <div class="points-section">
            <h2>Current Balance</h2>
            <div class="pts-value">{{ pts }}</div>
            <div style="font-size: 0.9rem; color: #94a3b8;">Available Points</div>
        </div>

        <a href="{{ ad_link }}" target="_blank" class="btn-smart-link">
            🚀 Click & Earn Points
        </a>

        <p class="info-text">
            Points will be updated automatically after clicking the link and staying for 30 seconds.
        </p>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro Dashboard</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        .balance-card { background: #161b22; border: 1px solid #30363d; border-radius: 25px; padding: 30px; text-align: center; margin-bottom: 20px; border-bottom: 4px solid #fbbf24; }
        .coin-val { font-size: 50px; font-weight: bold; color: #fbbf24; }
        .task-btn { background: #161b22; border: 1px solid #30363d; border-radius: 15px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; text-decoration: none; color: white; }
        .btn { background: #2563eb; color: white; padding: 10px 20px; border-radius: 10px; border: none; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div style="font-weight: bold; color: #2563eb;">EARNPRO</div>
    <div class="balance-card">
        <small style="color: #8b949e;">TOTAL BALANCE</small>
        <div class="coin-val">{{pts}}.00</div>
        <small>Min. Withdraw: 200 Coins</small>
    </div>

    <div style="font-size: 14px; margin-bottom: 10px; color: #8b949e;">DAILY TASKS</div>
    <a href="{{ad_link}}" class="task-btn">
        <div><b>Watch Video Ad</b><br><small>+10.00 Coins</small></div>
        <div style="background: #fbbf24; color: black; padding: 5px 10px; border-radius: 8px; font-weight: bold;">GO</div>
    </a>

    <div style="background: rgba(37,99,235,0.1); padding: 20px; border-radius: 20px; text-align: center; margin-top: 20px; border: 1px dashed #2563eb;">
        <small>Referral Code</small>
        <div style="font-size: 24px; color: #2563eb; font-weight: bold; margin: 10px 0;">EP-{{uid[:6]}}</div>
        <button class="btn" onclick="window.location.href='https://t.me/share/url?url=https://t.me/bot?start={{uid}}'">INVITE & EARN +15</button>
    </div>
</body>
</html>

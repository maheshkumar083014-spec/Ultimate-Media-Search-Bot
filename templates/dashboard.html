<div id="ai-power-station" class="glass-card mt-4 p-4">
    <h3 class="text-orange-500"><i class="fas fa-robot"></i> AI Power Station</h3>
    <div id="chat-box" class="h-48 overflow-y-auto mb-3 p-2 bg-black/20 rounded"></div>
    <div class="input-group">
        <input type="text" id="ai-input" class="form-control bg-transparent text-white" placeholder="Ask AI anything...">
        <button onclick="askAI()" class="btn btn-warning">Send</button>
    </div>
</div>

<script>
// Dynamic Task Loader
function loadTasks() {
    db.ref('admin_tasks').on('value', (snapshot) => {
        const tasks = snapshot.val();
        let html = '';
        for(let id in tasks) {
            html += `
            <div class="task-card p-3 mb-2 glass-card">
                <h5>${tasks[id].title}</h5>
                <p>Reward: ${tasks[id].points} Points</p>
                <button onclick="startTask('${tasks[id].url}', ${tasks[id].time})" class="btn btn-sm btn-orange">Start Task</button>
            </div>`;
        }
        document.getElementById('task-container').innerHTML = html;
    });
}
</script>

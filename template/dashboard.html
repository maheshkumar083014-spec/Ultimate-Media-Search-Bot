<!DOCTYPE html>
<html>
<head>
    <title>Earning Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body { background:#0d0d0d; color:white; font-family:Arial; padding:20px; }
        .card {
            background:#1a1a1a; padding:20px; border-radius:12px;
            margin-bottom:20px; box-shadow:0 0 10px rgba(255,215,0,0.3)
        }
        .premium {
            background:linear-gradient(135deg,#ffd700,#ff8c00);
            color:black;
            padding:20px;
            font-size:20px;
            font-weight:bold;
            border-radius:12px;
            text-align:center;
            margin-bottom:20px;
        }
        button {
            background:#ffd700; border:none; padding:15px;
            width:100%; border-radius:10px; font-size:18px;
        }
    </style>
</head>
<body>

<h2>Hello, {{name}}</h2>

{% if user.plan == "pro" or user.plan == "advertiser" %}
<div class="premium">
    🌟 Golden Premium Member<br>
    Plan: {{user.plan}}
</div>
{% endif %}

<div class="card">
    <h3>Your Points: {{user.points}}</h3>
    <p>Referral Link:</p>
    <input value="[t.me](https://t.me/YourBot?start={{uid}})" style="width:100%;padding:10px;">
</div>

<div class="card">
    <h3>Earn 25 Points</h3>
    <p>Watch ad for 30 sec:</p>
    <a href="[horizontallyresearchpolar.com](https://horizontallyresearchpolar.com/r0wbx3kyf?key=8b0a2298684c7cea730312add326101b)">
        <button>Open Ad</button>
    </a>
</div>

{% if user.plan == "advertiser" %}
<div class="card">
    <h3>Upload Work (Advertiser)</h3>
    <form method="POST" action="/upload">
        <input name="uid" type="hidden" value="{{uid}}">
        <input name="link" placeholder="Your Link" style="width:100%;padding:10px;margin:10px 0;">
        <button type="submit">Submit</button>
    </form>
</div>
{% endif %}

</body>
</html>

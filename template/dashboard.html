<div class="card" style="background: linear-gradient(45deg, #ffd700, #ff8c00); border-radius: 15px; padding: 20px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
    <h2>🏆 Golden Premium Card</h2>
    <p>User Status: <strong>{{ status.upper() }}</strong></p>
    <div style="font-size: 2em; margin: 10px 0;">Points: {{ points }}</div>
    <p>Multiplier: {{ '2x Active' if status == 'pro' else '1x Standard' }}</p>
</div>
